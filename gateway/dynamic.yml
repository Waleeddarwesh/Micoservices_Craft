http:
  middlewares:
    cors-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "*"
        accessControlAllowOriginList:
          - "*"
        accessControlMaxAge: 100
        addVaryHeader: true
    rate-limit-anon:
      rateLimit:
        average: 10
        burst: 20
    rate-limit-user:
      rateLimit:
        average: 100
        burst: 200

  routers:
    frontend_router:
      rule: "PathPrefix(`/`)"
      service: frontend_service
      entryPoints:
        - web
      middlewares:
        - cors-headers

    health_router:
      rule: "PathPrefix(`/health/`) || PathPrefix(`/api/docs/`) || PathPrefix(`/api/schema/`)"
      service: reporting_service
      entryPoints:
        - web

    realtime_router:
      rule: "PathPrefix(`/chat/`) || PathPrefix(`/notifications/`) || PathPrefix(`/ws/`)"
      service: realtime_service
      entryPoints:
        - web
      middlewares:
        - cors-headers

    auth_router:
      rule: "PathPrefix(`/accounts/`) || PathPrefix(`/auth/`)"
      service: auth_service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit-user

    catalog_router:
      rule: "PathPrefix(`/product/`) || PathPrefix(`/course/`)"
      service: catalog_service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit-user

    order_router:
      rule: "PathPrefix(`/orders/`) || PathPrefix(`/cart/`) || PathPrefix(`/return/`)"
      service: order_service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit-user

    payment_router:
      rule: "PathPrefix(`/payment/`)"
      service: payment_service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit-user

    platform_router:
      rule: "PathPrefix(`/review/`) || PathPrefix(`/disputes/`) || PathPrefix(`/support/`) || PathPrefix(`/audit/`)"
      service: platform_service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit-user

    ml_router:
      rule: "PathPrefix(`/recommendations/`)"
      service: ml_service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit-user

    reporting_router:
      rule: "PathPrefix(`/reports/`)"
      service: reporting_service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit-user

    # Unified Admin Service Routers
    admin_api_router:
      rule: "PathPrefix(`/admin-api/`) || PathPrefix(`/admin-schema.json`) || PathPrefix(`/api/workflows/`) || PathPrefix(`/api/audit/`) || PathPrefix(`/api/notifications-system/`) || PathPrefix(`/api/system-admin/`)"
      service: admin_service
      priority: 150
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit-user
        
    dashboard_router:
      rule: "PathPrefix(`/dashboard/`)"
      service: frontend_service
      priority: 150
      entryPoints:
        - web

    sysadmin_router:
      rule: "PathPrefix(`/sysadmin/`)"
      service: frontend_service
      priority: 150
      entryPoints:
        - web
        
    docs_router:
      rule: "PathPrefix(`/docs/`)"
      service: admin_service
      priority: 150
      entryPoints:
        - web
        
    developer_router:
      rule: "PathPrefix(`/developer/`)"
      service: admin_service
      priority: 150
      entryPoints:
        - web
        
    admin_router:
      rule: "PathPrefix(`/admin/`)"
      service: admin_service
      priority: 150
      entryPoints:
        - web

    django_static_router:
      rule: "PathPrefix(`/static/admin/`) || PathPrefix(`/static/developer/`) || PathPrefix(`/static/rest_framework/`) || PathPrefix(`/static/drf-spectacular/`) || PathPrefix(`/static/admin_interface/`) || PathPrefix(`/static/colorfield/`) || PathPrefix(`/static/drf-yasg/`) || PathPrefix(`/static/rest_framework_swagger/`) || PathPrefix(`/static/admin_custom/`) || PathPrefix(`/media/`)"
      service: admin_service
      priority: 200
      entryPoints:
        - web
      middlewares:
        - cors-headers

  services:
    frontend_service:
      loadBalancer:
        servers:
          - url: "http://frontend_service:80"

    realtime_service:
      loadBalancer:
        servers:
          - url: "http://realtime_service:8008"

    auth_service:
      loadBalancer:
        servers:
          - url: "http://auth_service:8001"

    catalog_service:
      loadBalancer:
        servers:
          - url: "http://catalog_service:8002"

    order_service:
      loadBalancer:
        servers:
          - url: "http://order_service:8003"

    payment_service:
      loadBalancer:
        servers:
          - url: "http://payment_service:8004"

    platform_service:
      loadBalancer:
        servers:
          - url: "http://platform_service:8005"

    ml_service:
      loadBalancer:
        servers:
          - url: "http://ml_service:8006"

    reporting_service:
      loadBalancer:
        servers:
          - url: "http://reporting_service:8007"

    admin_service:
      loadBalancer:
        servers:
          - url: "http://admin_service:8000"
