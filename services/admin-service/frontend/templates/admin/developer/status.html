{% extends "admin/developer/base.html" %}

{% block content %}
<div class="p-8 max-w-4xl mx-auto space-y-8" x-data="statusPoller()">
    <div class="bg-white dark:bg-surface border border-gray-200 dark:border-surface-border rounded-xl p-8 shadow-sm relative overflow-hidden">
        <!-- Optional top loading indicator bar -->
        <div x-show="isPolling" class="absolute top-0 left-0 h-1 bg-primary animate-pulse" style="width: 100%;"></div>

        <div class="border-b border-gray-200 dark:border-surface-border pb-6 mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">API Status</h1>
                <p class="text-gray-600 dark:text-gray-400">Current health and uptime of Craft APIs.</p>
            </div>
            
            <template x-if="status.overall === 'operational'">
                <div class="bg-green-50 dark:bg-green-500/20 text-green-700 dark:text-green-400 px-4 py-2 rounded-lg font-bold border border-green-200 dark:border-green-500/30 flex items-center gap-2 transition-all">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-500 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    All Systems Operational
                </div>
            </template>
            
            <template x-if="status.overall === 'degraded'">
                <div class="bg-yellow-50 dark:bg-yellow-500/20 text-yellow-700 dark:text-yellow-400 px-4 py-2 rounded-lg font-bold border border-yellow-200 dark:border-yellow-500/30 flex items-center gap-2 transition-all">
                    <i class="ph ph-warning animate-pulse"></i>
                    Degraded Performance
                </div>
            </template>
            
            <template x-if="status.overall === 'outage'">
                <div class="bg-red-50 dark:bg-red-500/20 text-red-700 dark:text-red-400 px-4 py-2 rounded-lg font-bold border border-red-200 dark:border-red-500/30 flex items-center gap-2 transition-all">
                    <i class="ph ph-warning-octagon animate-pulse"></i>
                    System Outage
                </div>
            </template>
        </div>
        
        <div class="space-y-4">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                Core Services
                <div x-show="isPolling" class="w-4 h-4 rounded-full border-2 border-primary border-t-transparent animate-spin ml-2"></div>
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <template x-for="service in status.services" :key="service.name">
                    <div class="bg-gray-50 dark:bg-bg border border-gray-200 dark:border-surface-border rounded-lg p-4 flex items-center justify-between transition-colors duration-300">
                        <span class="font-medium text-gray-800 dark:text-gray-200" x-text="service.name"></span>
                        
                        <template x-if="service.status === 'operational'">
                            <span class="text-green-600 dark:text-green-400 font-medium text-sm flex items-center gap-1"><i class="ph ph-check-circle"></i> Operational</span>
                        </template>
                        
                        <template x-if="service.status === 'degraded'">
                            <span class="text-yellow-600 dark:text-yellow-400 font-medium text-sm flex items-center gap-1"><i class="ph ph-warning"></i> Degraded</span>
                        </template>
                        
                        <template x-if="service.status === 'outage'">
                            <span class="text-red-600 dark:text-red-400 font-medium text-sm flex items-center gap-1"><i class="ph ph-x-circle"></i> Outage</span>
                        </template>
                    </div>
                </template>
            </div>
        </div>

        <div class="mt-8 pt-8 border-t border-gray-200 dark:border-surface-border flex justify-between items-center">
            <div class="text-gray-600 dark:text-gray-400 text-sm">
                Last checked: <span class="text-gray-900 dark:text-white font-medium" x-text="timeAgo"></span>
            </div>
            <div class="text-gray-600 dark:text-gray-400 text-sm">
                90-day Uptime: <span class="text-primary font-bold" x-text="status.uptime_90d"></span>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('statusPoller', () => ({
        status: {{ system_status_json|safe }},
        lastChecked: new Date(),
        timeAgo: 'Just now',
        isPolling: false,
        
        init() {
            setInterval(() => this.updateTimeAgo(), 1000);
            setInterval(() => this.pollStatus(), 30000); // Poll backend every 30s
        },
        
        async pollStatus() {
            this.isPolling = true;
            try {
                const res = await fetch('/developer/api/status/');
                if (res.ok) {
                    this.status = await res.json();
                    this.lastChecked = new Date();
                    this.updateTimeAgo();
                }
            } catch (e) {
                console.error("Failed to poll status:", e);
            } finally {
                setTimeout(() => { this.isPolling = false; }, 500); // brief delay so loader is visible
            }
        },
        
        updateTimeAgo() {
            const seconds = Math.floor((new Date() - this.lastChecked) / 1000);
            if (seconds < 5) this.timeAgo = 'Just now';
            else if (seconds < 60) this.timeAgo = seconds + ' seconds ago';
            else {
                const mins = Math.floor(seconds/60);
                this.timeAgo = mins + ' minute' + (mins > 1 ? 's' : '') + ' ago';
            }
        }
    }))
})
</script>
{% endblock %}
