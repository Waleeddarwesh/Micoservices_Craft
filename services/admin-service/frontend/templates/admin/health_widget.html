<div class="module" id="system-health-module" style="background:var(--as, #1e1e1e);border-radius:8px;padding:15px;margin-bottom:20px;border:1px solid var(--abd, #333);">
    <h2 style="margin:0 0 15px 0;font-size:14px;color:var(--at, #eee);border-bottom:1px solid var(--abd, #333);padding-bottom:10px;">
        <svg style="width:16px;height:16px;vertical-align:-3px;margin-right:5px;color:var(--ap, #7fb04f)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        System Health
    </h2>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--abd, #2a2a2a);">
        <strong style="color:var(--atq, #bbb);font-size:13px;">Database (SQLite/Postgres)</strong>
        {% if health.database == 'up' %}
            <span style="color:#28a745;font-weight:bold;font-size:13px;display:flex;align-items:center;gap:4px;">Operational <svg style="width:14px;height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
        {% else %}
            <span style="color:#dc3545;font-weight:bold;font-size:13px;">Down / Unreachable ❌</span>
        {% endif %}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;">
        <strong style="color:var(--atq, #bbb);font-size:13px;">Redis Cache / MQ</strong>
        {% if health.redis == 'up' %}
            <span style="color:#28a745;font-weight:bold;font-size:13px;display:flex;align-items:center;gap:4px;">Operational <svg style="width:14px;height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
        {% else %}
            <span style="color:#dc3545;font-weight:bold;font-size:13px;">Down / Unreachable ❌</span>
        {% endif %}
    </div>
</div>
