# =============================================================================
# Handcrafts — Docker Compose (Local Development ONLY)
# =============================================================================
# Spins up the full Handcrafts stack locally for development and testing.
# ⚠️  Railway does NOT use this file. Railway uses railway.json + Procfile.
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose up -d django       # start only Django + dependencies
#   docker compose logs -f django     # tail Django logs
#   docker compose down -v            # stop and remove volumes
#
# The .env file in the project root is loaded automatically.
# =============================================================================

services:

  # ---- Django Web Application ----
  django:
    build:
      context: .
      dockerfile: dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 Handcrafts.asgi:application"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- PostgreSQL Database ----
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: handcrafts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (Cache & Message Broker) ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Celery Worker ----
  celery:
    build:
      context: .
      dockerfile: dockerfile
    command: celery -A Handcrafts worker --loglevel=info -P solo
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - CELERY_TASK_ALWAYS_EAGER=False
    depends_on:
      django:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Celery Beat (Task Scheduler) ----
  celery_beat:
    build:
      context: .
      dockerfile: dockerfile
    command: celery -A Handcrafts beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    depends_on:
      django:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
