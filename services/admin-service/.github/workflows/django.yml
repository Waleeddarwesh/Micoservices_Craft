name: Django CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # We set up a minimal env for Django tests
    env:
      SECRET_KEY: "github-actions-dummy-key"
      DEBUG: "True"
      DATABASE_URL: "sqlite:///db.sqlite3" # Use sqlite for tests to avoid complex DB setup in CI

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Django System Checks
      run: |
        python manage.py check
        
    - name: Verify Migrations (Ensure no missing migrations)
      run: |
        python manage.py makemigrations --check --dry-run
        
    - name: Run Unit Tests
      run: |
        python manage.py test

    - name: Build Docker Image
      run: |
        docker build -t waleeddarwesh/craft:latest .
