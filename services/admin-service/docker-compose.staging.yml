services:
  web:
    image: waleeddarwesh/craft:${IMAGE_TAG}
    container_name: craft_staging_web
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      gunicorn Handcrafts.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120

  celery:
    image: waleeddarwesh/craft:${IMAGE_TAG}
    container_name: craft_staging_celery
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - db
      - redis
    command: celery -A Handcrafts worker -l info

  db:
    image: postgres:15-alpine
    container_name: craft_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: craft_staging
      POSTGRES_USER: craft_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - craft_staging_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: craft_staging_redis
    restart: unless-stopped
    volumes:
      - craft_staging_redis_data:/data

volumes:
  craft_staging_postgres_data:
  craft_staging_redis_data:
