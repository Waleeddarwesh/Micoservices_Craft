---
# =============================================================================
# Handcrafts — Ansible Site Playbook
# =============================================================================
# Main entry point for Ansible configuration management.
#
# This playbook provisions and configures servers for the Handcrafts platform.
# It is designed to be idempotent — safe to run multiple times.
#
# Usage:
#   ansible-playbook -i inventory.ini site.yml
#   ansible-playbook -i inventory.ini site.yml --tags "docker"   # run only docker tasks
#   ansible-playbook -i inventory.ini site.yml --check            # dry-run mode
# =============================================================================


# ---- Play 1: Base Server Configuration ----
# Applied to all servers — installs common packages, hardens security,
# and sets up monitoring agents.
- name: Base server configuration
  hosts: webservers
  become: true
  gather_facts: true

  vars:
    app_user: handcrafts
    app_dir: /opt/handcrafts
    python_version: "3.11"

  roles:
    - role: common
      tags: [common, base]
    - role: webserver
      tags: [webserver, docker]


# ---- Play 2: Local Development Setup ----
# Quick setup for the developer's local machine. Does not require root.
- name: Local development environment setup
  hosts: local
  gather_facts: true

  vars:
    project_root: "{{ playbook_dir }}/../../"

  tasks:
    - name: Ensure required project directories exist
      ansible.builtin.file:
        path: "{{ project_root }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - logs
        - media
        - staticfiles
      tags: [local, dirs]

    - name: Check if .env file exists
      ansible.builtin.stat:
        path: "{{ project_root }}/.env"
      register: env_file
      tags: [local, env]

    - name: Warn if .env is missing
      ansible.builtin.debug:
        msg: "⚠️  No .env file found at {{ project_root }}/.env — copy .env.example and fill in your values."
      when: not env_file.stat.exists
      tags: [local, env]
