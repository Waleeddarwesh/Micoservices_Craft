---
# =============================================================================
# Role: common
# =============================================================================
# Installs essential system packages, creates the application user,
# configures the firewall, and sets up basic security hardening.
# =============================================================================

- name: Update package cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags: [packages]

- name: Update package cache (RHEL/CentOS)
  ansible.builtin.dnf:
    update_cache: true
  when: ansible_os_family == "RedHat"
  tags: [packages]

- name: Install essential system packages
  ansible.builtin.package:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - unzip
      - python3-pip
      - python3-venv
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
  tags: [packages]

- name: Create application user
  ansible.builtin.user:
    name: "{{ app_user | default('handcrafts') }}"
    shell: /bin/bash
    create_home: true
    system: false
  tags: [users]

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir | default('/opt/handcrafts') }}"
    state: directory
    owner: "{{ app_user | default('handcrafts') }}"
    group: "{{ app_user | default('handcrafts') }}"
    mode: "0755"
  tags: [dirs]

- name: Set timezone to UTC
  ansible.builtin.timezone:
    name: UTC
  tags: [system]

- name: Ensure UFW is installed (Debian-based)
  ansible.builtin.apt:
    name: ufw
    state: present
  when: ansible_os_family == "Debian"
  tags: [firewall]

- name: Allow SSH through firewall
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  when: ansible_os_family == "Debian"
  tags: [firewall]

- name: Allow HTTP through firewall
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: ansible_os_family == "Debian"
  tags: [firewall]

- name: Allow HTTPS through firewall
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: ansible_os_family == "Debian"
  tags: [firewall]

- name: Enable UFW with default deny policy
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming
  when: ansible_os_family == "Debian"
  tags: [firewall]
