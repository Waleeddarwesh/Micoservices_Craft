# =============================================================================
# Handcrafts — Ansible Inventory
# =============================================================================
# This inventory defines the hosts that Ansible will manage.
#
# Usage:
#   ansible-playbook -i inventory.ini site.yml
#   ansible -i inventory.ini webservers -m ping          # test connectivity
#   ansible -i inventory.ini all --list-hosts             # show all hosts
#
# For dynamic AWS inventory, consider using the aws_ec2 plugin instead:
#   https://docs.ansible.com/ansible/latest/collections/amazon/aws/aws_ec2_inventory.html
# =============================================================================

[local]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[webservers]
# Production servers — replace with your actual IPs or hostnames
# web01 ansible_host=10.0.10.15 ansible_user=handcrafts ansible_ssh_private_key_file=~/.ssh/handcrafts-prod.pem
# web02 ansible_host=10.0.11.22 ansible_user=handcrafts ansible_ssh_private_key_file=~/.ssh/handcrafts-prod.pem

[webservers:vars]
ansible_python_interpreter=/usr/bin/python3

[all:vars]
# Shared variables across all host groups
app_user=handcrafts
app_dir=/opt/handcrafts
python_version=3.11
