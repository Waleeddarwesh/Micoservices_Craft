# =============================================================================
# Handcrafts — Kubernetes Namespace, ConfigMap, Secrets & ServiceAccount
# =============================================================================
# This file sets up the foundational resources that the deployments depend on.
# Apply this FIRST before applying deployment.yaml and service.yaml.
#
# ⚠️  IMPORTANT: Replace placeholder values with your actual configuration.
#     In production, manage secrets with AWS Secrets Manager or HashiCorp Vault
#     instead of storing them in this file.
#
# Usage:
#   kubectl apply -f config-secrets.yaml
#   kubectl apply -f deployment.yaml
#   kubectl apply -f service.yaml
# =============================================================================


# ---- Namespace ----
# Isolates all Handcrafts resources from other workloads in the cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: handcrafts
  labels:
    app.kubernetes.io/part-of: handcrafts-platform

---

# ---- ServiceAccount ----
# Pods will run under this identity — useful for RBAC and IAM roles for
# service accounts (IRSA) when accessing AWS resources like S3.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: handcrafts-sa
  namespace: handcrafts
  annotations:
    # Uncomment and set this when using IAM Roles for Service Accounts (IRSA)
    # eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/handcrafts-pod-role
  labels:
    app.kubernetes.io/part-of: handcrafts-platform

---

# ---- ConfigMap ----
# Non-sensitive configuration shared across all pods.
apiVersion: v1
kind: ConfigMap
metadata:
  name: handcrafts-config
  namespace: handcrafts
  labels:
    app.kubernetes.io/part-of: handcrafts-platform
data:
  # Django settings
  ENVIRONMENT: "production"
  DEBUG: "False"
  DJANGO_LOG_LEVEL: "WARNING"
  ALLOWED_HOSTS: ".handcrafts.example.com,localhost"

  # Internal service URLs (these match the K8s Service names)
  REDIS_URL: "redis://redis-service.handcrafts.svc.cluster.local:6379/0"

  # Celery
  CELERY_TASK_ALWAYS_EAGER: "False"

  # Email
  DEFAULT_FROM_EMAIL: "crafteginc@gmail.com"

---

# ---- Secret ----
# Sensitive values — all values must be base64-encoded.
# Encode with:  echo -n "your-value" | base64
#
# In a real production setup, use:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault
#   - Sealed Secrets
apiVersion: v1
kind: Secret
metadata:
  name: handcrafts-secrets
  namespace: handcrafts
  labels:
    app.kubernetes.io/part-of: handcrafts-platform
type: Opaque
data:
  # Django secret key (base64 encoded)
  # Generate a new one:  python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
  SECRET_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # PostgreSQL connection string (base64 encoded)
  DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # Stripe API keys (base64 encoded)
  STRIPE_SECRET_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  STRIPE_PUBLISHABLE_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  STRIPE_WEBHOOK_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # SendGrid / Email (base64 encoded)
  SENDGRID_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # Google OAuth (base64 encoded)
  GOOGLE_CLIENT_ID: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"
