# =============================================================================
# Handcrafts — Kubernetes Services & Ingress
# =============================================================================
# Networking layer for the Handcrafts platform.
#
# Architecture:
#   Internet → Ingress (nginx) → django-service → django pods
#   Internal: celery pods → redis-service → redis pod
#
# Usage:
#   kubectl apply -f service.yaml
# =============================================================================


# ---- Django ClusterIP Service ----
# Internal service — the Ingress controller handles external traffic.
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: handcrafts
  labels:
    app.kubernetes.io/name: handcrafts
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: handcrafts
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---

# ---- Redis ClusterIP Service ----
# Internal only — workers and the web app connect to this.
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: handcrafts
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP

---

# ---- Ingress (nginx-ingress-controller) ----
# Routes external HTTPS traffic to the Django service.
# Make sure the nginx ingress controller is installed in your cluster:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/aws/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: handcrafts-ingress
  namespace: handcrafts
  annotations:
    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Rate limiting to protect against abuse
    nginx.ingress.kubernetes.io/limit-rps: "25"
    # Upload size for product images
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.handcrafts.example.com
      secretName: handcrafts-tls
  rules:
    - host: api.handcrafts.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django-service
                port:
                  name: http
